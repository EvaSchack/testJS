<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <h1>Cykel Information</h1>
  <body>
    <main>
      <section id="cykelliste"></section>
    </main>

    <script>
      const cykeler = [
        {
          mærke: "Damecykel",
          model: "Domane SL 7",
          farve: "Rød",
          tilføjelser: ["Kurv", "Lys", "Lås"],
        },
        {
          mærke: "Herrecykel",
          model: "Domane SL 7",
          farve: "Rød",
          tilføjelser: ["Kurv"],
        },
        {
          mærke: "Børnecykel",
          model: "Domane SL 7",
          farve: "Rød",
          tilføjelser: ["Kurv", "Lys", "Blomster"],
        },
      ];

      const cykelliste = document.querySelector("#cykelliste");

      function showCykel() {
        console.log(cykeler[0].model);
        cykeler.forEach((cykel) => {
          cykelliste.innerHTML += `
        <h2>Mærke: ${cykel.mærke}</h2>
        <p>Model: ${cykel.model}</p>
        <p>Farve: ${cykel.farve}</p>
        <p>Tilføjelser: ${cykel.tilføjelser.join(", ")}</p>
      `;
        });
      }
      showCykel();
    </script>
  </body>
</html>
